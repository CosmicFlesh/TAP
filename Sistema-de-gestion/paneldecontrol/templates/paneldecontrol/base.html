{% load static %}
<html>
  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">    <script src="{% static 'js/script.js' %}"></script>
  </head>
  <body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
          <div class="container-fluid">
            <a class="navbar-brand" href={% url 'index' %}>heladeria</a>
            <a href="{% url 'index' %}">
                    <img src="{% static 'images/helado.png' %}" id="logo" width="50px" alt="helado" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href={% url 'index' %}>Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href={% url 'inventario' %}>Productos</a>
                </li>

                {% if request.user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href={% url 'exit' %}>Salir</a>
                    </li>

                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href={% url 'login' %}>Ingresar</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href={% url 'register' %}>Registrarse</a>
                    </li>

                {% endif %}

              </ul>
            </div>
          </div>
        </nav>
    {% block content %}{% endblock %}
    </div>


  </body>
</html>
