{% load static %}
<html>
  <head>
    <title>{% block title  %}{% endblock  %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">    <script src="{% static 'js/script.js' %}"></script>
  </head>
  <body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light bg-info">
          <div class="container-fluid">
            <a class="navbar-brand" href={% url 'index' %}>heladeria</a>
            <a href="{% url 'index' %}">
              <img src="{% static 'images/helado.png' %}" id="logo" width="50px" alt="helado" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href={% url 'index' %}>Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href={% url 'inventario' %}>Productos</a>
                </li>

                {% if request.user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href={% url 'exit' %}>Salir</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href={% url 'admin:index' %}>Admin</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href={% url 'login' %}>Ingresar</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href={% url 'register' %}>Registrarse</a>
                    </li>

                     

                {% endif %}

              </ul>
            </div>
          </div>
        </nav>
        <div class="container py-2">
    {% block content %}
    
    {% endblock %}
              <div id="fondo" class="card-footer fixed-bottom container-fluid">
                <h2 id="copy">Heladeria hipotetica© 2026</h1>
                <a href="{% url 'contact' %}">contacto</a>
              </div>
        </div>
    </div>
     <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js"
        integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous">
    </script>
  </body>
</html>
