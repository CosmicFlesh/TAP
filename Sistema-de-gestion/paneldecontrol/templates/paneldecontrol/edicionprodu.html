{% extends 'paneldecontrol/base.html' %} {% load static %} {% block title %}Editar{% endblock %} 
{% block content %}

<div class="row">
  <div class="col-md-11 offset-md-4s mx-auto p-2 ">
    <h1>Editar Producto</h1>
    <div class="col-sm-12 col-md-6 col-lg-4 col-xl-4">
      <div class="card w-20">
        <div class="card-body">
          <form action="/editarprodu/" method="POST">
            {% csrf_token %}
            <div class="form-group">
              <input
                type="text"
                id="txtcodigo"
                name="txtcodigo"
                value="{{Inventario.codigo}}"
                class="form-control"
                placeholder="codigo produ"
                minlength="1"
                maxlength="128"
                readonly
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="txtnombre"
                name="txtnombre"
                value="{{Inventario.nombreproducto}}"
                class="form-control"
                placeholder="Nombre producto"
                minlength="3"
                maxlength="40"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="txtcantidad"
                name="txtcantidad"
                value="{{Inventario.cantidad}}"
                class="form-control"
                placeholder="Cantidad producto"
                minlength="1"
                maxlength="128"
                required
              />
            </div>
            <div class="form-group">
              <select name="txtcategoria" value="{{Inventario.categoria}}" class="form-control" required>
                <option value="">Seleccione Categoría</option>
                {% for row in categoria %}
                <option value="{{row.id}}">{{row.nombre}}</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <select
                name="txtmarca"
                value="{{Inventario.marca}}"
                class="form-control"
                required
              >
                <option value="">Seleccione Marca</option>
                {% for row in marca %}
                <option value="{{ row.id }}">{{ row.marca }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <input
                type="text"
                id="txtfecha"
                name="txtfecha"
                value="{{Inventario.pub_date}}"
                class="form-control"
                placeholder="fecha entrada"
                minlength="1"
                maxlength="128"
                required
              />
            </div>
            <div class="form-group">
              <button
                type="submit"
                class="btn btn-success btn-block text-white"
              >
                Guardar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
